method_name: CAUSE

description: >
  Causal Analysis Using Summary Effect Estimates (CAUSE) is a Mendelian Randomization method
  designed to distinguish causal effects from correlated and uncorrelated horizontal pleiotropy
  using genome-wide summary statistics.

package: cause
install:
  github: 'devtools::install_github("jean997/cause@v1.2.0")'

function:
  name: cause
  args:
    X: "<prepared_data>"
    param_ests: "<prepared_params>"
    variants: "<prepared_variants>"

  input_format:
    required_fields:
      - snp
      - beta_hat_1
      - seb1
      - beta_hat_2
      - seb2
      - A1
      - A2

  prepare_inputs:
    X:
      type: data.frame
      description: >
        Harmonized exposure and outcome GWAS summary statistics generated by gwas_merge().
        The required columns are ["snp", "beta_hat_1", "seb1", "beta_hat_2", "seb2", "A1", "A2"].
        CAUSE does not use the traditional TwoSampleMR harmonized format directly.
      construction: |
        X <- gwas_merge(
          X1 = as.data.frame(exposure_data),
          X2 = as.data.frame(outcome_data),
          snp_name_cols = c("rsid", "rsid"),
          beta_hat_cols = c("beta", "beta"),
          se_cols       = c("standard_error", "standard_error"),
          A1_cols       = c("effect_allele", "effect_allele"),
          A2_cols       = c("other_allele", "other_allele")
        )

    param_ests:
      type: list
      description: >
        Parameter estimates required by cause(). In the tested CAUSE version,
        cause() fails if param_ests is not provided.
      construction: |
        set.seed(123)
        if (nrow(X) > 500000) {
          X_param <- X[sample(seq_len(nrow(X)), 500000), ]
        } else {
          X_param <- X
        }

        param_ests <- est_cause_params(
          X = X_param,
          variants = X_param$snp
        )

    variants:
      type: character vector
      description: >
        SNP identifiers used for posterior fitting in cause().
        Do not pass all SNPs directly if many variants have large p-values.
        CAUSE recommends using a p-value threshold for posterior fitting.
      construction: |
        X$p_exp <- 2 * pnorm(-abs(X$beta_hat_1 / X$seb1))

        variants <- X$snp[X$p_exp < 0.01]

        if (length(variants) < 10) {
          variants <- X$snp[X$p_exp < 0.05]
        }

        if (length(variants) < 10) {
          stop("Too few variants for CAUSE posterior fitting.")
        }

common_errors:
  - error_type: missing_function_make_data
    error_message: "could not find function \"make_data\""
    cause: >
      make_data() is not a function in the cause package. CAUSE input should be prepared using
      gwas_merge(), not by passing exposure and outcome file paths into make_data().
    diagnosis_object:
      - generated R script
      - CAUSE input preparation step
    repair_action: >
      Remove make_data(). Use gwas_merge() to merge exposure and outcome GWAS summary statistics
      into a data.frame with columns snp, beta_hat_1, seb1, beta_hat_2, seb2, A1, and A2.
    repair_code: |
      X <- gwas_merge(
        X1 = as.data.frame(exposure_data),
        X2 = as.data.frame(outcome_data),
        snp_name_cols = c("rsid", "rsid"),
        beta_hat_cols = c("beta", "beta"),
        se_cols       = c("standard_error", "standard_error"),
        A1_cols       = c("effect_allele", "effect_allele"),
        A2_cols       = c("other_allele", "other_allele")
      )

  - error_type: unsupported_gwas_merge_argument
    error_message: "参数没有用(pval_cols = c(p_exp, p_out))"
    cause: >
      The installed CAUSE version does not support the pval_cols argument in gwas_merge().
    diagnosis_object:
      - gwas_merge function call
      - installed CAUSE package version
    repair_action: >
      Remove pval_cols from gwas_merge(). If p-values are needed, compute them manually from
      beta_hat_1/seb1 or beta_hat_2/seb2 after merging.
    repair_code: |
      X <- gwas_merge(
        X1 = as.data.frame(exposure_data),
        X2 = as.data.frame(outcome_data),
        snp_name_cols = c("rsid", "rsid"),
        beta_hat_cols = c("beta", "beta"),
        se_cols       = c("standard_error", "standard_error"),
        A1_cols       = c("effect_allele", "effect_allele"),
        A2_cols       = c("other_allele", "other_allele")
      )

      X$p_exp <- 2 * pnorm(-abs(X$beta_hat_1 / X$seb1))

  - error_type: missing_param_ests
    error_message: "缺少参数\"param_ests\",也缺失默认值"
    cause: >
      In the tested CAUSE version, cause() requires nuisance parameter estimates.
      The analysis cannot be run with only X and variants.
    diagnosis_object:
      - cause function call
      - CAUSE parameter estimation step
    repair_action: >
      Run est_cause_params() before cause(), then pass the resulting object to the param_ests argument.
    repair_code: |
      set.seed(123)

      if (nrow(X) > 500000) {
        X_param <- X[sample(seq_len(nrow(X)), 500000), ]
      } else {
        X_param <- X
      }

      param_ests <- est_cause_params(
        X = X_param,
        variants = X_param$snp
      )

      res <- cause(
        X = X,
        variants = variants,
        param_ests = param_ests
      )

  - error_type: large_pvalue_variants
    error_message: >
      I noticed that some of the variants you are running with have large p-values (> 0.01).
    cause: >
      The variants argument passed to cause() contains many weakly associated variants.
      CAUSE recommends posterior fitting using variants selected by a p-value threshold.
    diagnosis_object:
      - variants argument in cause()
      - exposure association p-values
    repair_action: >
      Do not pass all SNPs to variants. Compute exposure p-values from beta_hat_1 and seb1,
      then select variants with p < 0.01. If too few variants are selected, relax to p < 0.05.
      Alternatively, pass pval_thresh = 0.01 if supported by the installed CAUSE version.
    repair_code: |
      X$p_exp <- 2 * pnorm(-abs(X$beta_hat_1 / X$seb1))

      variants <- X$snp[X$p_exp < 0.01]

      if (length(variants) < 10) {
        variants <- X$snp[X$p_exp < 0.05]
      }

      if (length(variants) < 10) {
        stop("Too few variants for CAUSE posterior fitting.")
      }

      res <- cause(
        X = X,
        variants = variants,
        param_ests = param_ests
      )

  - error_type: invalid_save_after_failed_cause
    error_message: "找不到对象'res_cause'"
    cause: >
      The CAUSE analysis failed, but the script continued to save or plot res_cause.
      Since res_cause was never created, downstream saving and plotting steps also failed.
    diagnosis_object:
      - tryCatch block
      - result saving step
      - plotting step
    repair_action: >
      Stop execution immediately if cause() fails. Do not save or plot a missing result object.
    repair_code: |
      res_cause <- tryCatch(
        {
          cause(
            X = X,
            variants = variants,
            param_ests = param_ests
          )
        },
        error = function(e) {
          stop(paste("CAUSE analysis failed:", conditionMessage(e)))
        }
      )

      saveRDS(res_cause, "cause_result.rds")

example_code: |
  library(data.table)
  library(cause)

  exposure_file <- "exposure.tsv.gz"
  outcome_file  <- "outcome.tsv.gz"

  exposure_data <- fread(exposure_file)
  outcome_data  <- fread(outcome_file)

  exposure_data <- exposure_data[!is.na(rsid) & rsid != ""]
  outcome_data  <- outcome_data[!is.na(rsid) & rsid != ""]

  exposure_data[, beta := as.numeric(beta)]
  outcome_data[, beta := as.numeric(beta)]

  exposure_data[, standard_error := as.numeric(standard_error)]
  outcome_data[, standard_error := as.numeric(standard_error)]

  exposure_data[, effect_allele := toupper(as.character(effect_allele))]
  outcome_data[, effect_allele := toupper(as.character(effect_allele))]

  exposure_data[, other_allele := toupper(as.character(other_allele))]
  outcome_data[, other_allele := toupper(as.character(other_allele))]

  exposure_data <- exposure_data[
    !is.na(beta) &
    !is.na(standard_error) &
    !is.na(effect_allele) &
    !is.na(other_allele) &
    standard_error > 0
  ]

  outcome_data <- outcome_data[
    !is.na(beta) &
    !is.na(standard_error) &
    !is.na(effect_allele) &
    !is.na(other_allele) &
    standard_error > 0
  ]

  exposure_data <- exposure_data[!duplicated(rsid)]
  outcome_data  <- outcome_data[!duplicated(rsid)]

  X <- gwas_merge(
    X1 = as.data.frame(exposure_data),
    X2 = as.data.frame(outcome_data),
    snp_name_cols = c("rsid", "rsid"),
    beta_hat_cols = c("beta", "beta"),
    se_cols       = c("standard_error", "standard_error"),
    A1_cols       = c("effect_allele", "effect_allele"),
    A2_cols       = c("other_allele", "other_allele")
  )

  set.seed(123)

  if (nrow(X) > 500000) {
    X_param <- X[sample(seq_len(nrow(X)), 500000), ]
  } else {
    X_param <- X
  }

  param_ests <- est_cause_params(
    X = X_param,
    variants = X_param$snp
  )

  X$p_exp <- 2 * pnorm(-abs(X$beta_hat_1 / X$seb1))

  variants <- X$snp[X$p_exp < 0.01]

  if (length(variants) < 10) {
    variants <- X$snp[X$p_exp < 0.05]
  }

  if (length(variants) < 10) {
    stop("Too few variants for CAUSE posterior fitting.")
  }

  res <- cause(
    X = X,
    variants = variants,
    param_ests = param_ests
  )

  saveRDS(res, "cause_result.rds")
  print(summary(res))
  plot(res)

output:
  type: cause_result
  description: >
    The result object returned by cause(), including model comparison information,
    posterior distributions, and fitted sharing/causal models.
  fields:
    - name: elpd
      type: matrix | data.frame
      description: >
        Expected Log Predictive Density comparison between models. Use as.data.frame(res$elpd)
        if it needs to be exported to CSV.
    - name: sharing
      type: model object
      description: >
        Fitted sharing model object.
    - name: causal
      type: model object
      description: >
        Fitted causal model object.
    - name: posterior
      type: list
      description: >
        Posterior samples or summaries of CAUSE model parameters, depending on package version.

references:
  - "Morrison J, Knoblauch N, Marcus JH, Stephens M, He X. Mendelian randomization accounting for correlated and uncorrelated pleiotropic effects using genome-wide summary statistics. Nat Genet. 2020;52:740–747. doi:10.1038/s41588-020-0631-4"