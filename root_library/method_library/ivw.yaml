IVW:
  description: >
    Inverse Variance Weighted (IVW) is one of the most commonly used traditional Mendelian Randomization (MR) methods.
    It assumes that all genetic instruments are valid and there is no horizontal pleiotropy.
    IVW estimates the causal effect by calculating a weighted average of SNP-specific ratios.
  package: TwoSampleMR
  function: mr

  input_format:
    required_fields:
      - SNP
      - beta.exposure
      - se.exposure
      - beta.outcome
      - se.outcome
      - effect_allele.exposure
      - effect_allele.outcome
      - other_allele.exposure
      - other_allele.outcome

  prepare_inputs:
    harmonised_data:
      type: data.frame
      description: >
        A harmonized dataset of exposure and outcome summary statistics.
        This can be generated using the harmonise_data() function from the TwoSampleMR package.
      construction: |
        harmonised_data <- harmonise_data(exposure_data, outcome_data)

  params:
    method_list: ["mr_ivw"]

  output:
    type: data.frame
    fields:
      - method
      - b
      - se
      - pval

  example_code: |
    # Step 1: Extract exposure data (example)
    exposure_data_path <- "D:\\pycharm_projects\\AgentLaboratory\\AgentLaboratory\\research_results\\processed_data\\filtered_exposure_data.csv"
    exposure_data <- read_csv(exposure_data_path)


    # Step 2: Extract outcome data
    outcome_data_path  <- "D:\\pycharm_projects\\AgentLaboratory\\AgentLaboratory\\research_results\\processed_data\\filtered_outcome_data.csv"
    outcome_data  <- read_csv(outcome_data_path)

    # Step 3: Harmonize the datasets
    harmonised_data <- harmonise_data(exposure_data, outcome_data)

    # Step 4: Perform MR using the IVW method
    mr_result <- mr(harmonised_data, method_list = c("mr_ivw"))
